<head>
<title>Psychology of Social Media</title>

</head>
<body>

    <header>
        <h1 class="header">Survey Form</h1>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Homepage</a></li>
            <li><a href="Page1.html">Brain Effects</a></li>
            <li><a href="Page2.html">Social Media Apps</a></li>
            <li><a href="Page3.html">Statistics</a></li>
        </ul>
    </nav>
    <main>
        <section class="Survey-box"> 
        <h2>Social Media Survey</h2>
        <p class="intro"> Please answer the quesions below about your social media usage</p>
        <form>
            <div class="Form">
                <label for="name">Full name</label>
                <input type="text" id="name" placeholder="Enter your name" required>
            </div>

            <Div class="Form2">
                <label for="apps"> Most used social media app</label>
            <select id="app">
                    <option>TikTok</option>
                    <option>Instagram</option>
                    <option>Snapchat</option>
                    <option>Youtube</option>
                    <option>Twitter</option>
                    <option>Facebook</option>
            </select>
            </Div>
            <Div class="Form3">
                <label id="Question1"> How many hours do you spend on social media</label>
            
            <div class="radio">
                <label>
                    <input type="radio" name="hours">
                    less than 1 Hour
                </label>
                <label>
                    <input type="radio" name="hours">
                    1-3 Hours
                </label>
                <label>
                    <input type="radio" name="hours">
                    4-6 Hours
                </label>
                <label>
                    <input type="radio" name="hours">
                    More than 6 Hours
                </label>
            </div>

            <div class="form-group">
                <label> What effects have you experienced from social media?</label>
                <div class="Checkbox">
                    <label>
                        <input type="checkbox">
                        Anxiety
                    </label>
                    <label>
                        <input type="checkbox">
                        Sleep loss
                    </label>
                    <label>
                        <input type="checkbox">
                        Low Self Esteem
                    </label>
                    <label>
                        <input type="checkbox">
                        Better Communication
                    </label>
                    <label>
                        <input type="checkbox">
                        Entertainment
                    </label>
                </div>
            </div>
            <div class="Form-group2">
               <label> Do you think social media affects mental health?</label>
               <textarea id="opinion" rows="5" placeholder="Write Your Opinion here..."></textarea>
            </div>
            <button type="submit"> Submit Survey</button>
            <button type="reset">Reset Survey</button>
        </form>
        </section>
    </main>
